{% extends 'base.html' %}
{% block title %}Add Teacher - Attendify{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 w-full fade-in pb-12">
  <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
    <div class="bg-gradient-to-r from-purple-600 to-indigo-600 px-8 py-6">
      <h2 class="text-3xl font-bold text-white flex items-center gap-3">
        <svg class="w-8 h-8 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
        Register New Teacher
      </h2>
      <p class="mt-2 text-indigo-100">Add a new faculty member to the system.</p>
    </div>

    <form action="/teacherlogin" method="POST" enctype="multipart/form-data" class="p-8 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Teacher Name</label>
          <input type="text" name="Username" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm py-2 px-3 border bg-slate-50">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Teacher Email</label>
          <input type="email" name="Email" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm py-2 px-3 border bg-slate-50">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" name="Password" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm py-2 px-3 border bg-slate-50">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Mobile Number</label>
          <input type="number" name="Mobile" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm py-2 px-3 border bg-slate-50">
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-slate-700 mb-1">Profile Photo</label>
          <input type="file" name="file" required class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer border border-slate-200 rounded-md bg-slate-50 p-1">
        </div>
      </div>

      <div class="pt-4 flex justify-end">
        <button type="submit" class="inline-flex justify-center py-3 px-6 border border-transparent rounded-lg shadow-md text-base font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
          Add Teacher
        </button>
      </div>
    </form>
  </div>
</div>

<script>
    window.onload = function () {
        var message = "{{ message }}";
        if (message) {
            alert(message);
        }
    }
</script>
{% endblock %}
