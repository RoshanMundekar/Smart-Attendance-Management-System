{% extends 'base.html' %}
{% block title %}Create Notice - Attendify{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 w-full fade-in pb-12">
  <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
    <div class="bg-gradient-to-r from-orange-600 to-amber-600 px-8 py-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div>
        <h2 class="text-3xl font-bold text-white flex items-center gap-3">
          <svg class="w-8 h-8 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"></path></svg>
          Publish New Announcement
        </h2>
        <p class="mt-2 text-orange-100">Broadcast important information to teachers or students.</p>
      </div>
    </div>

    <form action="/Notice" method="POST" enctype="multipart/form-data" class="p-8 space-y-8">
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Target Audience</label>
          <div class="grid grid-cols-2 gap-4">
            <label class="relative flex cursor-pointer rounded-lg border bg-white p-4 shadow-sm focus:outline-none hover:bg-slate-50 transition-colors border-slate-200">
              <input type="radio" name="recipient" value="teacher" class="sr-only peer" required>
              <div class="flex w-full items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9.5a2.5 2.5 0 00-2.5-2.5H15M9 11l3 3L22 4"></path></svg>
                    </div>
                    <div>
                        <p class="font-medium text-slate-900">Teachers</p>
                        <p class="text-xs text-slate-500">Faculty members</p>
                    </div>
                </div>
                <svg class="h-5 w-5 text-orange-600 opacity-0 peer-checked:opacity-100 transition-opacity" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
              </div>
              <div class="absolute -inset-px rounded-lg border-2 peer-checked:border-orange-500 pointer-events-none" aria-hidden="true"></div>
            </label>
            <label class="relative flex cursor-pointer rounded-lg border bg-white p-4 shadow-sm focus:outline-none hover:bg-slate-50 transition-colors border-slate-200">
              <input type="radio" name="recipient" value="student" class="sr-only peer">
              <div class="flex w-full items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path></svg>
                    </div>
                    <div>
                        <p class="font-medium text-slate-900">Students</p>
                        <p class="text-xs text-slate-500">Enrolled students</p>
                    </div>
                </div>
                <svg class="h-5 w-5 text-orange-600 opacity-0 peer-checked:opacity-100 transition-opacity" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
              </div>
              <div class="absolute -inset-px rounded-lg border-2 peer-checked:border-orange-500 pointer-events-none" aria-hidden="true"></div>
            </label>
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Subject / Title</label>
          <input type="text" id="noticeTitle" name="noticeTitle" required class="block w-full border-slate-300 rounded-lg shadow-sm focus:ring-orange-500 focus:border-orange-500 sm:text-sm py-3 px-4 border bg-slate-50 text-slate-900 placeholder-slate-400" placeholder="e.g., Campus Closure for Holidays">
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Notice Content</label>
          <textarea id="noticeContent" name="noticeContent" rows="6" required class="block w-full border-slate-300 rounded-lg shadow-sm focus:ring-orange-500 focus:border-orange-500 sm:text-sm py-3 px-4 border bg-slate-50 text-slate-900 placeholder-slate-400" placeholder="Type your detailed message here..."></textarea>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">Attachment (Optional)</label>
          <div class="flex items-center justify-center w-full">
            <label for="file" class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-colors group">
                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                    <svg class="w-8 h-8 mb-3 text-slate-400 group-hover:text-orange-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="mb-2 text-sm text-slate-500"><span class="font-semibold text-orange-600">Click to upload Document</span></p>
                    <p class="text-xs text-slate-500" id="file_name_display">PDF, DOCX, or Image</p>
                </div>
                <input id="file" name="file" type="file" class="hidden" onchange="document.getElementById('file_name_display').textContent = this.files[0].name" />
            </label>
          </div>
        </div>
      </div>

      <div class="pt-4 flex justify-end">
        <button type="submit" class="inline-flex items-center justify-center py-3 px-8 border border-transparent rounded-lg shadow-md text-base font-medium text-white bg-orange-600 hover:bg-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transition-colors hover:scale-[1.02]">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
          Publish Content
        </button>
      </div>
    </form>
  </div>
</div>

<script>
    window.onload = function () {
        var message = "{{ msg }}";
        if (message && message !== "None") {
            alert(message);
            window.location.replace("/adminindex");
        }
    }
</script>
{% endblock %}
