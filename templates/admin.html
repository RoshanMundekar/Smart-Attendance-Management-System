{% extends 'base.html' %}
{% block title %}Admin Login - Attendify{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-20 relative fade-in">
  <!-- Glowing effect behind card -->
  <div class="absolute -inset-1 bg-gradient-to-r from-red-500 to-orange-500 rounded-2xl blur-xl opacity-30 animate-pulse"></div>
  
  <div class="relative bg-white/90 backdrop-blur-xl rounded-2xl shadow-2xl p-8 border border-white/50">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-red-50 text-red-600 mb-4 shadow-inner ring-4 ring-white">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
      </div>
      <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Admin Portal</h2>
      <p class="text-slate-500 mt-2 text-sm font-medium">Secure access for system administrators only</p>
    </div>

    <form action="/SessionHandle1" method="POST" class="space-y-6">
      <div>
        <label for="username" class="block text-sm font-semibold text-slate-700">Username</label>
        <div class="mt-1 relative rounded-md shadow-sm">
          <input type="text" id="username" name="username" required class="focus:ring-red-500 focus:border-red-500 block w-full sm:text-sm border-slate-300 rounded-lg py-3 px-4 border bg-white focus:bg-slate-50 transition-colors" placeholder="admin">
        </div>
      </div>

      <div>
        <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
        <div class="mt-1 relative rounded-md shadow-sm">
          <input type="password" id="password" name="password" required class="focus:ring-red-500 focus:border-red-500 block w-full sm:text-sm border-slate-300 rounded-lg py-3 px-4 border bg-white focus:bg-slate-50 transition-colors" placeholder="••••••••">
        </div>
      </div>

      <div class="pt-2">
        <button type="submit" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-xl text-sm font-bold text-white bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-700 hover:to-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-all hover:-translate-y-0.5">
          Secure Login
        </button>
      </div>
    </form>
    
    <div class="mt-8 text-center">
        <a href="/" class="text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors inline-flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Return to Home
        </a>
    </div>
  </div>
</div>
{% endblock %}
