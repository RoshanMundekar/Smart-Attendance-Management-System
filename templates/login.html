{% extends 'base.html' %}
{% block title %}Teacher Portal - Attendify{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto mt-12 bg-white rounded-2xl shadow-2xl overflow-hidden glass border border-slate-200">
  <div class="grid grid-cols-1 md:grid-cols-2 min-h-[500px]">
    
    <!-- Info Section -->
    <div class="bg-gradient-to-br from-primary-600 to-indigo-800 p-12 text-white flex flex-col justify-center relative overflow-hidden">
      <!-- Decorative rings -->
      <div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 rounded-full border border-white/10 shadow-inner"></div>
      <div class="absolute bottom-0 left-0 -ml-16 -mb-16 w-48 h-48 rounded-full border border-white/10 shadow-inner"></div>
      
      <div class="relative z-10">
          <h2 class="text-4xl font-extrabold mb-4 drop-shadow-md">Teacher Portal</h2>
          <p class="text-primary-100 text-lg mb-8 drop-shadow-sm">Manage your classes, mark student attendance via smart facial recognition, and generate dynamic reports.</p>
          
          <!-- Toggle Buttons -->
          <div class="flex flex-wrap gap-4">
            <button onclick="document.getElementById('signin-form').classList.remove('hidden'); document.getElementById('signup-form').classList.add('hidden');" class="px-6 py-2 rounded-full border border-white hover:bg-white hover:text-primary-600 transition-colors font-semibold shadow-sm focus:outline-none focus:ring-2 focus:ring-white/50">Sign In</button>
            <button onclick="document.getElementById('signup-form').classList.remove('hidden'); document.getElementById('signin-form').classList.add('hidden');" class="px-6 py-2 rounded-full bg-white text-primary-600 hover:bg-primary-50 transition-colors font-semibold shadow-lg focus:outline-none focus:ring-2 focus:ring-white">Register</button>
          </div>
      </div>
    </div>

    <!-- Forms Section -->
    <div class="p-8 sm:p-12 flex flex-col justify-center">
      <!-- Sign In Form -->
      <div id="signin-form" class="fade-in">
        <h3 class="text-2xl font-bold text-slate-900 mb-6 flex items-center gap-2">
            <svg class="w-6 h-6 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
            Sign In
        </h3>
        <form action="/tlogin" method="POST" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
            <input type="text" name="Username1" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-primary-500 focus:border-primary-500 sm:text-sm py-3 px-3 border bg-slate-50 transition-colors">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input type="password" name="Password1" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-primary-500 focus:border-primary-500 sm:text-sm py-3 px-3 border bg-slate-50 transition-colors">
          </div>
          <button type="submit" class="w-full py-3 px-4 mt-4 border border-transparent rounded-md shadow-md text-sm font-bold text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 hover:scale-[1.02] transition-transform">
            Sign In to Dashboard
          </button>
        </form>
      </div>

      <!-- Sign Up Form -->
      <div id="signup-form" class="hidden fade-in">
        <h3 class="text-2xl font-bold text-slate-900 mb-6 flex items-center gap-2">
            <svg class="w-6 h-6 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
            Register Teacher
        </h3>
        <form action="/teacherlogin" method="POST" enctype="multipart/form-data" class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-slate-700 mb-1">Username</label>
            <input type="text" name="Username" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm py-2 px-3 border bg-slate-50">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-700 mb-1">Email</label>
            <input type="email" name="Email" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm py-2 px-3 border bg-slate-50">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-700 mb-1">Password</label>
              <input type="password" name="Password" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm py-2 px-3 border bg-slate-50">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-700 mb-1">Mobile No</label>
              <input type="number" name="Mobile" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm py-2 px-3 border bg-slate-50">
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-700 mb-1">Profile Photo</label>
            <input type="file" name="file" required class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
          </div>
          <button type="submit" class="w-full py-3 px-4 mt-2 border border-transparent rounded-md shadow-md text-sm font-bold text-white bg-slate-900 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 hover:scale-[1.02] transition-transform">
            Create Account
          </button>
        </form>
      </div>
      
    </div>
  </div>
</div>
{% endblock %}
