{% extends 'base.html' %}
{% block title %}Student Registration - Attendify{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 w-full fade-in pb-12">
  <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
    <div class="bg-gradient-to-r from-pink-600 to-rose-600 px-8 py-6">
      <h2 class="text-3xl font-bold text-white flex items-center gap-3">
        <svg class="w-8 h-8 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
        Register New Student
      </h2>
      <p class="mt-2 text-pink-100">Enter student details below to register them in the system.</p>
    </div>

    <form action="/createprofile" method="POST" class="p-8 space-y-8">
      <!-- Section 1: Personal Info -->
      <div>
        <h3 class="text-lg font-semibold text-slate-900 border-b border-slate-200 pb-2 mb-4">Personal Information</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">College ID</label>
            <input type="text" name="id" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 sm:text-sm py-2 px-3 border bg-slate-50">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
            <input type="text" name="Username" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 sm:text-sm py-2 px-3 border bg-slate-50">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email ID</label>
            <input type="email" name="EmailId" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 sm:text-sm py-2 px-3 border bg-slate-50">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Mobile No</label>
            <input type="number" name="MobileNo" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 sm:text-sm py-2 px-3 border bg-slate-50">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">PRN No / Password</label>
            <input type="number" name="PRNNo" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 sm:text-sm py-2 px-3 border bg-slate-50">
          </div>
        </div>
      </div>

      <!-- Section 2: Academic Info -->
      <div>
        <h3 class="text-lg font-semibold text-slate-900 border-b border-slate-200 pb-2 mb-4">Academic Details</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Academic Year</label>
            <select name="year" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 sm:text-sm py-2 px-3 border bg-slate-50">
              <option value="" disabled selected>Select Year</option>
              <option value="2019-2020">2019-2020</option>
              <option value="2020-2021">2020-2021</option>
              <option value="2021-2022">2021-2022</option>
              <option value="2022-2023">2022-2023</option>
              <option value="2023-2024">2023-2024</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Department</label>
            <select name="DEPARTMENT" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 sm:text-sm py-2 px-3 border bg-slate-50">
              <option value="" disabled selected>Select Dept</option>
              <option value="Computer">Computer</option>
              <option value="Civil">Civil</option>
              <option value="Electrical">Electrical</option>
              <option value="Mechanical">Mechanical</option>
              <option value="Instrumentation">Instrumentation</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Class</label>
            <select name="class1" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 sm:text-sm py-2 px-3 border bg-slate-50">
              <option value="" disabled selected>Select Class</option>
              <option value="FIRST-YEAR">FIRST YEAR</option>
              <option value="SECOND-YEAR">SECOND YEAR</option>
              <option value="THIRD-YEAR">THIRD YEAR</option>
              <option value="FINAL-YEAR">FINAL YEAR</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Section 3: Address Info -->
      <div>
        <h3 class="text-lg font-semibold text-slate-900 border-b border-slate-200 pb-2 mb-4">Address Information</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">Current Address</label>
            <input type="text" name="caddress" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 sm:text-sm py-2 px-3 border bg-slate-50">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-slate-700 mb-1">Permanent Address</label>
            <input type="text" name="paddress" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 sm:text-sm py-2 px-3 border bg-slate-50">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">State</label>
            <input type="text" name="state" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 sm:text-sm py-2 px-3 border bg-slate-50">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">District</label>
            <input type="text" name="District" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 sm:text-sm py-2 px-3 border bg-slate-50">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Pincode</label>
            <input type="text" name="pincode" required class="block w-full border-slate-300 rounded-md shadow-sm focus:ring-pink-500 focus:border-pink-500 sm:text-sm py-2 px-3 border bg-slate-50">
          </div>
        </div>
      </div>

      <div class="pt-4 flex justify-end">
        <button type="submit" class="inline-flex justify-center py-3 px-6 border border-transparent rounded-lg shadow-md text-base font-medium text-white bg-pink-600 hover:bg-pink-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pink-500 transition-colors">
          Submit Registration
        </button>
      </div>
    </form>
  </div>
</div>

<script>
    window.onload = function () {
        var message = "{{ msg }}";
        if (message) {
            alert(message);
            window.location.replace("/adminindex");
        }
    }
</script>
{% endblock %}
